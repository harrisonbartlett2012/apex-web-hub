<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX // Cloud Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body class="bg-gray-900 text-teal-400 font-mono h-screen flex flex-col p-4 md:p-8">

    <header class="flex justify-between items-center border-b border-teal-500/30 pb-4 mb-4">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-teal-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-widest text-teal-300">APEX // WEB_HUB</h1>
        </div>
        <div id="status-badge" class="px-3 py-1 bg-gray-800 border border-teal-500/50 rounded text-xs transition-colors duration-300">
            CONNECTING...
        </div>
    </header>

    <main id="chat-window" class="flex-1 bg-gray-800/50 border border-gray-700 rounded-lg p-4 overflow-y-auto mb-4 space-y-4 shadow-inner scroll-smooth"></main>

    <footer class="flex gap-2">
        <input type="text" id="cmd-input" placeholder="Enter query or topic to synthesize..." class="flex-1 bg-gray-800 border border-gray-600 rounded px-4 py-3 text-teal-100 focus:outline-none focus:border-teal-400 focus:ring-1 focus:ring-teal-400 transition-all" />
        <button onclick="sendCommand()" class="bg-teal-700 hover:bg-teal-600 text-white px-6 py-3 rounded font-bold tracking-wider transition-colors">EXECUTE</button>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const cmdInput = document.getElementById('cmd-input');
        const statusBadge = document.getElementById('status-badge');
        const socket = io();
        
        let isFirstConnect = true;

        socket.on('connect', () => {
            statusBadge.innerText = "ONLINE";
            statusBadge.classList.replace('text-red-400', 'text-teal-400');
            statusBadge.classList.replace('border-red-500', 'border-teal-500');
            
            // Only show welcome message once per page load to prevent mobile spam
            if (isFirstConnect) {
                appendMessage("APEX", "[SYSTEM ONLINE] Welcome to APEX Web Hub. Core Engine ready.");
                isFirstConnect = false;
            }
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = "OFFLINE";
            statusBadge.classList.replace('text-teal-400', 'text-red-400');
            statusBadge.classList.replace('border-teal-500', 'border-red-500');
        });

        socket.on('server_message', (data) => appendMessage(data.sender, data.text));
        socket.on('ai_response', (data) => appendMessage(data.sender, data.text));

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            const senderColor = sender === "You" ? "text-white" : "text-teal-400";
            const formattedText = text.replace(/\n/g, '<br>');
            msgDiv.innerHTML = `<span class="${senderColor} font-bold mb-1 block">${sender}:</span> <span class="text-gray-300 block">${formattedText}</span>`;
            
            chatWindow.appendChild(msgDiv);
            
            // Smart Scrolling Logic
            if (sender === "APEX") {
                // Scrolls to the top of APEX's new message smoothly
                msgDiv.scrollIntoView({ behavior: "smooth", block: "start" });
            } else {
                // Keeps user input locked to the bottom
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function sendCommand() {
            const text = cmdInput.value.trim();
            if (!text) return;
            appendMessage("You", text);
            cmdInput.value = '';
            socket.emit('user_message', { command: text });
        }

        cmdInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendCommand();
            }
        });
    </script>
</body>
</html>
